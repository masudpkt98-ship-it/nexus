name: nexus

# Production profile: API served by nginx + PHP-FPM (OPcache), APP_DEBUG off,
# config/views cached, database & cache not exposed to the host, restart policies.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Set a stable APP_KEY and (optionally) ANTHROPIC_API_KEY via a .env file next to
# this one — see .env.example.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nexus}
      POSTGRES_USER: ${DB_USERNAME:-nexus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexus}
    volumes:
      - db-data:/var/lib/postgresql/data
    # No host port in production — only reachable inside the compose network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nexus} -d ${DB_DATABASE:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ./nexus-api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      APP_NAME: NEXUS
      APP_ENV: production
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8000}
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-nexus}
      DB_USERNAME: ${DB_USERNAME:-nexus}
      DB_PASSWORD: ${DB_PASSWORD:-nexus}
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
    ports:
      - "${API_PORT:-8000}:80"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./nexus-app
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  db-data:
  redis-data:
