# Render Blueprint — provisions the whole NEXUS stack in one guided step:
# Postgres + Laravel API + Next.js Web. Render → New → Blueprint → connect this
# repo → it reads this file → you fill 3 secrets → Apply. Far fewer clicks than
# wiring services by hand.
databases:
  - name: nexus-db
    databaseName: nexus
    user: nexus
    plan: free

services:
  # --- Laravel API (Docker) ---------------------------------------------------
  - type: web
    name: nexus-api
    runtime: docker
    rootDir: nexus-api
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_NAME
        value: NEXUS
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY          # paste the key I gave you (secret)
        sync: false
      - key: ADMIN_PASSWORD   # your strong initial admin password (secret)
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase: { name: nexus-db, property: host }
      - key: DB_PORT
        fromDatabase: { name: nexus-db, property: port }
      - key: DB_DATABASE
        fromDatabase: { name: nexus-db, property: database }
      - key: DB_USERNAME
        fromDatabase: { name: nexus-db, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: nexus-db, property: password }
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: LOG_LEVEL
        value: warning

  # --- Next.js Web ------------------------------------------------------------
  - type: web
    name: nexus-web
    runtime: node
    rootDir: nexus-app
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: /api
      - key: API_PROXY_TARGET   # set to the API service URL after first deploy
        sync: false
